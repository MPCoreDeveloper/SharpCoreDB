version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      dotnet-microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"
          - "Aspire.*"
          - "Grpc.*"
          - "OpenTelemetry.*"
      serilog:
        patterns:
          - "Serilog*"
    ignore:
      # gRPC 2.8.x — reviewed, not affected by reported CVEs
      - dependency-name: "Grpc.Tools"
        versions: ["2.8.*"]
      - dependency-name: "Grpc.Core"
        versions: ["2.8.*"]
      - dependency-name: "Grpc.Net.Client"
        versions: ["2.8.*"]
      - dependency-name: "Grpc.AspNetCore"
        versions: ["2.8.*"]
      - dependency-name: "Grpc.Net.ClientFactory"
        versions: ["2.8.*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    labels:
      - "dependencies"
      - "github-actions"
